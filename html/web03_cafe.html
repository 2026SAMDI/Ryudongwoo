<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="t_s">카페카페</title>
    <link rel="stylesheet" href="../css/web_02intro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <img src="../images/free-icon-coffee-cups-9833664.png" alt="카페 이미지" class="cafe-image"style="float: left; width: 34px;">
    <h1 class="hahmlet-400 t_s" id="text1">카페카페</h1>

    <hr>
    <!-- 메뉴안내 -->
    <h2 class="t_d" class="hahmlet-400" id="text2">주문서 작성</h2>

<form style="line-height: 30px;">
    <fieldset>
        <legend>주문자 정보</legend>
        <label for="name">주문자 이름<input type="text" size="15.5" maxlength="5" autofocus required></label><br>
        <label for="tel">연락처<input type="tel" id="tel" value="010-" ></label><br>
        <label for="email">이메일<input type="email" id="email" placeholder="@포함"></label><br>
    </fieldset>
   <fieldset>
        <legend>수령 방법 및 시간</legend>
        <label >수령 방식
            <label ><input type="radio" name="delivery" value="pickup">픽업</label>
            <label ><input type="radio" name="delivery" value="delivery" checked>배달</label>
        </label><br>
        <label >픽업 날짜<input type="date"></label><br>
        <label >픽업 시간<input type="time"></label><br>
    </fieldset>
    <fieldset>
        <legend>메뉴 및 상세 옵션</legend>
        <label >주문 메뉴<select size="1" multiple>


            <option value="americano" selected>아메리카노</option>
            <option value="latte">카페라떼</option>
            <option value="strawberry_smoothie">딸기 스무디</option>
            <option value="mango_smoothie">망고 스무디</option>
            <option value="cheesecake">치즈케이크</option>
            <option value="jajangmeon">짜장면</option>
        </select></label><br>
        <label >HOT/COLD 선택
            <label ><input type="radio" name="temp" value="hot">HOT</label>
            <label ><input type="radio" name="temp" value="cold">COLD</label>
        </label><br>
        <label >얼음의 양
            <input type="range" min="0" max="10" value="5" step="0.1"></label><br>
        <label >추가 옵션
            <label><input type="checkbox" name="options" value="shot">샷 추가</label>
            <label><input type="checkbox" name="options" value="hazelnut_syrup">헤이즐넛 시럽 추가</label>
            <label><input type="checkbox" name="options" value="utensils" checked>식기 동봉</label>
        </label><br>
        <label >주문 수량
            <input type="number" min="1" max="15" value="1"></label><br>
    </fieldset>
     <fieldset>
        <legend>기타 요청 사항</legend>
        <label >요청 사항<textarea name="requests" rows="4" cols="50" placeholder="기타 요청 사항을 입력해주세요"></textarea></label><br>
        <label >쿠폰 코드<input type="search"></label><br>
        <label >비밀번호(주문확인용)<input type="password"></label><br>
    </fieldset>
    
    <button type="submit" value="주문하기">주문하기</button>
    <button type="reset" value="다시작성">다시작성</button>
    <a href="web02_cofe.html" type="button" target="_blank">이전 페이지로 돌아가기</a>
    <p>만일 수령하신 상품에 문제가 있다면 즉시 반품 신청해주세요</p>
    <p>반품 신청시 상품의 상태를 사진으로 첨부해 주세요</p>
    <input type="file">
</form>




</body>
</html>
